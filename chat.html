<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
    }

    .nav-links {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .language-switcher {
      border-radius: 6px;
      padding: 4px 6px;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      background: white;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 12px;
      max-width: 70%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.4;
    }

    .me {
      background: #2563eb;
      color: white;
      margin-left: auto;
    }

    .other {
      background: #e5e7eb;
    }

    .input-row {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .input-row button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <span id="pageTitle">Chat</span>

  <div class="nav-links">
    <a href="chat-list.html" id="backBtn">Back</a>

    <select id="languageSwitcher" class="language-switcher">
      <option value="en">EN</option>
      <option value="ja">日本語</option>
    </select>
  </div>
</div>

<div class="chat-container">
  <div id="messages" class="messages"></div>

  <div class="input-row">
    <input id="messageInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const languageSwitcher = document.getElementById("languageSwitcher");

let currentUser = null;
let chatId = new URLSearchParams(window.location.search).get("chatId");

function getText(lang){
  if(lang === "ja"){
    return {
      title:"チャット",
      back:"戻る",
      placeholder:"メッセージを入力...",
      send:"送信",
      empty:"チャットが選択されていません"
    }
  }
  return {
    title:"Chat",
    back:"Back",
    placeholder:"Type a message...",
    send:"Send",
    empty:"No chat selected"
  }
}

function t(key){
  return getText(getCurrentLanguage())[key]
}

function applyLanguage(){
  const lang = getCurrentLanguage()
  const text = getText(lang)

  document.title = text.title
  document.getElementById("pageTitle").innerText = text.title
  document.getElementById("backBtn").innerText = text.back
  input.placeholder = text.placeholder
  sendBtn.innerText = text.send

  languageSwitcher.value = lang
}

languageSwitcher.addEventListener("change", e=>{
  setCurrentLanguage(e.target.value)
  applyLanguage()
})

onAuthStateChanged(auth, user=>{
  if(!user){
    window.location.href="login.html"
    return
  }

  currentUser = user
  loadMessages()
})

function loadMessages(){
  if(!chatId){
    messagesDiv.innerHTML = `<p class="empty">${t("empty")}</p>`
    return
  }

  onValue(ref(db, `messages/${chatId}`), snapshot=>{
    messagesDiv.innerHTML = ""

    const data = snapshot.val() || {}

    Object.values(data).forEach(msg=>{
      const div = document.createElement("div")
      div.className = "message " + (msg.uid === currentUser.uid ? "me":"other")
      div.innerText = msg.text
      messagesDiv.appendChild(div)
    })

    messagesDiv.scrollTop = messagesDiv.scrollHeight
  })
}

sendBtn.addEventListener("click", sendMessage)
input.addEventListener("keypress", e=>{
  if(e.key === "Enter") sendMessage()
})

function sendMessage(){
  const text = input.value.trim()
  if(!text) return

  const newMsgRef = push(ref(db, `messages/${chatId}`))

  set(newMsgRef,{
    uid: currentUser.uid,
    text,
    createdAt: Date.now()
  })

  input.value = ""
}

applyLanguage()
</script>

</body>
</html>
