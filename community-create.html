<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Community Post</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: normal;
    }

    #userInfo {
      font-size: 16px;
      font-weight: normal;
    }

    .language-switcher {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    textarea,
    input[type="file"] {
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
    }

    .preview {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      margin-top: 12px;
      border-radius: 10px;
      display: none;
      background: #f9fafb;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <span id="pageTitle">Create Community Post</span>
    </div>

    <div class="nav-links">
      <a href="index.html" id="navHome">Home</a>
      <a href="community.html" id="navCommunity">Community</a>
      <a href="friends.html" id="navFriends">Friends</a>
      <a href="chat-list.html" id="navChats">Chats</a>
      <a href="profile.html" id="navProfile">Profile</a>

      <select id="languageSwitcher" class="language-switcher">
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>

      <span id="userInfo"></span>
      <a href="login.html" id="authLink">Login</a>
    </div>
  </div>

  <div class="container">
    <h1 id="heading">Share Something</h1>

    <label id="contentLabel">Post Content</label>
    <textarea id="postText" placeholder="Share something about campus life..."></textarea>

    <label id="imageLabel">Upload Image</label>
    <input type="file" id="postImage" accept="image/*">

    <img id="imagePreview" class="preview" alt="Preview">

    <button id="submitBtn">Post</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, get, push, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

    const userInfo = document.getElementById("userInfo");
    const authLink = document.getElementById("authLink");
    const imageInput = document.getElementById("postImage");
    const imagePreview = document.getElementById("imagePreview");
    const submitBtn = document.getElementById("submitBtn");
    const postText = document.getElementById("postText");
    const languageSwitcher = document.getElementById("languageSwitcher");

    let currentUser = null;
    let currentProfile = null;
    let selectedImageBase64 = "";
    let isSubmitting = false;

    function getCommunityCreateText(lang) {
      if (lang === "ja") {
        return {
          pageTitle: "コミュニティ投稿を作成",
          home: "ホーム",
          community: "コミュニティ",
          friends: "友達",
          chats: "チャット",
          profile: "プロフィール",
          login: "ログイン",
          logout: "ログアウト",
          heading: "投稿をシェア",
          content: "投稿内容",
          contentPlaceholder: "キャンパス生活についてシェアしましょう...",
          image: "画像をアップロード",
          post: "投稿する",
          posting: "投稿中...",
          pleaseLoginFirst: "先にログインしてください。",
          pleaseAddTextOrImage: "テキストまたは画像を追加してください。",
          postCreated: "コミュニティ投稿を作成しました。",
          failedToCreatePost: "投稿の作成に失敗しました: "
        };
      }

      return {
        pageTitle: "Create Community Post",
        home: "Home",
        community: "Community",
        friends: "Friends",
        chats: "Chats",
        profile: "Profile",
        login: "Login",
        logout: "Logout",
        heading: "Share Something",
        content: "Post Content",
        contentPlaceholder: "Share something about campus life...",
        image: "Upload Image",
        post: "Post",
        posting: "Posting...",
        pleaseLoginFirst: "Please login first.",
        pleaseAddTextOrImage: "Please add some text or an image.",
        postCreated: "Community post created!",
        failedToCreatePost: "Failed to create post: "
      };
    }

    function t(key) {
      return getCommunityCreateText(getCurrentLanguage())[key] || key;
    }

    function applyLanguage() {
      const lang = getCurrentLanguage();
      const text = getCommunityCreateText(lang);

      document.documentElement.lang = lang;
      document.title = text.pageTitle;

      document.getElementById("pageTitle").innerText = text.pageTitle;
      document.getElementById("navHome").innerText = text.home;
      document.getElementById("navCommunity").innerText = text.community;
      document.getElementById("navFriends").innerText = text.friends;
      document.getElementById("navChats").innerText = text.chats;
      document.getElementById("navProfile").innerText = text.profile;
      document.getElementById("heading").innerText = text.heading;
      document.getElementById("contentLabel").innerText = text.content;
      document.getElementById("postText").placeholder = text.contentPlaceholder;
      document.getElementById("imageLabel").innerText = text.image;
      document.getElementById("submitBtn").innerText = isSubmitting ? text.posting : text.post;

      if (authLink.dataset.loggedIn === "true") {
        authLink.innerText = text.logout;
      } else {
        authLink.innerText = text.login;
      }

      languageSwitcher.value = lang;
    }

    languageSwitcher.addEventListener("change", (e) => {
      setCurrentLanguage(e.target.value);
      applyLanguage();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        currentUser = null;
        currentProfile = null;
        userInfo.innerText = "";
        authLink.dataset.loggedIn = "false";
        authLink.innerText = t("login");
        authLink.href = "login.html";
        authLink.onclick = null;
        applyLanguage();
        return;
      }

      currentUser = user;

      try {
        const snapshot = await get(ref(db, "users/" + user.uid));
        currentProfile = snapshot.exists() ? snapshot.val() : null;
        userInfo.innerText = "👤 " + (currentProfile?.name || user.email);
      } catch (error) {
        console.error(error);
        userInfo.innerText = "👤 " + user.email;
      }

      authLink.dataset.loggedIn = "true";
      authLink.innerText = t("logout");
      authLink.href = "#";
      authLink.onclick = async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = "login.html";
      };

      applyLanguage();
    });

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) {
        selectedImageBase64 = "";
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        selectedImageBase64 = e.target.result;
        imagePreview.src = selectedImageBase64;
        imagePreview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    submitBtn.addEventListener("click", async () => {
      if (isSubmitting) return;

      if (!currentUser) {
        alert(t("pleaseLoginFirst"));
        return;
      }

      const text = postText.value.trim();

      if (!text && !selectedImageBase64) {
        alert(t("pleaseAddTextOrImage"));
        return;
      }

      try {
        isSubmitting = true;
        submitBtn.disabled = true;
        submitBtn.innerText = t("posting");

        const newPostRef = push(ref(db, "communityPosts"));

        await set(newPostRef, {
          uid: currentUser.uid,
          name: currentProfile?.name || currentUser.email,
          avatar: currentProfile?.avatar || "",
          text: text,
          image: selectedImageBase64 || "",
          createdAt: Date.now()
        });

        alert(t("postCreated"));
        window.location.href = "community-feed.html";
      } catch (error) {
        console.error(error);
        alert(t("failedToCreatePost") + error.message);
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.innerText = t("post");
      }
    });

    applyLanguage();
  </script>
</body>
</html>
