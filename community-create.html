<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Community Post</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: normal;
    }

    #userInfo {
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    textarea,
    input[type="file"] {
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
    }

    .preview {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      margin-top: 12px;
      border-radius: 10px;
      display: none;
      background: #f9fafb;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Create Community Post</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="community.html">Community</a>
      <a href="friends.html">Friends</a>
      <a href="chat-list.html">Chats</a>
      <a href="profile.html">Profile</a>
      <span id="userInfo"></span>
      <a href="login.html" id="authLink">Login</a>
    </div>
  </div>

  <div class="container">
    <h1>Share Something</h1>

    <label>Post Content</label>
    <textarea id="postText" placeholder="Share something about campus life..."></textarea>

    <label>Upload Image</label>
    <input type="file" id="postImage" accept="image/*">

    <img id="imagePreview" class="preview" alt="Preview">

    <button id="submitBtn">Post</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, get, push, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const userInfo = document.getElementById("userInfo");
    const authLink = document.getElementById("authLink");
    const imageInput = document.getElementById("postImage");
    const imagePreview = document.getElementById("imagePreview");
    const submitBtn = document.getElementById("submitBtn");
    const postText = document.getElementById("postText");

    let currentUser = null;
    let currentProfile = null;
    let selectedImageBase64 = "";
    let isSubmitting = false;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        currentUser = null;
        currentProfile = null;
        userInfo.innerText = "";
        authLink.innerText = "Login";
        authLink.href = "login.html";
        authLink.onclick = null;
        return;
      }

      currentUser = user;

      try {
        const snapshot = await get(ref(db, "users/" + user.uid));
        currentProfile = snapshot.exists() ? snapshot.val() : null;
        userInfo.innerText = "👤 " + (currentProfile?.name || user.email);
      } catch (error) {
        console.error(error);
        userInfo.innerText = "👤 " + user.email;
      }

      authLink.innerText = "Logout";
      authLink.href = "#";
      authLink.onclick = async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = "login.html";
      };
    });

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) {
        selectedImageBase64 = "";
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        selectedImageBase64 = e.target.result;
        imagePreview.src = selectedImageBase64;
        imagePreview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    submitBtn.addEventListener("click", async () => {
      if (isSubmitting) return;

      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const text = postText.value.trim();

      if (!text && !selectedImageBase64) {
        alert("Please add some text or an image.");
        return;
      }

      try {
        isSubmitting = true;
        submitBtn.disabled = true;
        submitBtn.innerText = "Posting...";

        const newPostRef = push(ref(db, "communityPosts"));

        await set(newPostRef, {
          uid: currentUser.uid,
          name: currentProfile?.name || currentUser.email,
          avatar: currentProfile?.avatar || "",
          text: text,
          image: selectedImageBase64 || "",
          createdAt: Date.now()
        });

        alert("Community post created!");
        window.location.href = "community-feed.html";
      } catch (error) {
        console.error(error);
        alert("Failed to create post: " + error.message);
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.innerText = "Post";
      }
    });
  </script>
</body>
</html>
