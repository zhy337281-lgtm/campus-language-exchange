<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    .link {
      margin-top: 16px;
      text-align: center;
    }

    .link a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="navbar">Campus Language Exchange</div>

  <div class="container">
    <h1>Register</h1>

    <label>Name</label>
    <input type="text" id="name" placeholder="Enter your name" />

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" />

    <button onclick="registerUser()">Register</button>

    <div class="link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    async function registerUser() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        await sendEmailVerification(user); 

        await set(ref(db, "users/" + user.uid), {
          name: name,
          email: email,
          createdAt: Date.now()
        });

        alert("Registration successful! Please verify your email before logging in.");
        window.location.href = "login.html";
      } catch (error) {
        alert("Registration failed: " + error.message);
        console.error(error);
      }
    }

    window.registerUser = registerUser;
  </script>
</body>
</html>
