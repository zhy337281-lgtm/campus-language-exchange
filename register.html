<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .language-switcher {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .link {
      margin-top: 16px;
      text-align: center;
    }

    .link a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span id="siteTitle">LinkCampus Community</span>

    <select id="languageSwitcher" class="language-switcher">
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <div class="container">
    <h1 id="pageTitle">Register</h1>

    <label id="nameLabel">Name</label>
    <input type="text" id="name" placeholder="Enter your name" />

    <label id="emailLabel">Email</label>
    <input type="email" id="email" placeholder="Enter your email" />

    <label id="passwordLabel">Password</label>
    <input type="password" id="password" placeholder="Enter your password" />

    <button id="registerBtn" onclick="registerUser()">Register</button>

    <div class="link">
      <span id="loginText">Already have an account?</span>
      <a href="login.html" id="loginLink">Login</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

    const languageSwitcher = document.getElementById("languageSwitcher");
    let isRegistering = false;

    function getRegisterText(lang) {
      if (lang === "ja") {
        return {
          title: "LinkCampus Community",
          pageTitle: "新規登録",
          name: "名前",
          namePlaceholder: "名前を入力してください",
          email: "メールアドレス",
          emailPlaceholder: "メールアドレスを入力してください",
          password: "パスワード",
          passwordPlaceholder: "パスワードを入力してください",
          register: "登録",
          registering: "登録中...",
          alreadyHaveAccount: "すでにアカウントをお持ちですか？",
          login: "ログイン",
          fillAllFields: "すべての項目を入力してください。",
          registerSuccess:
`登録が完了しました！

📩 確認メールを送信しました。
⚠️ 見当たらない場合は、迷惑メールフォルダも確認してください。

メール認証後にログインできます。`,
          registerFailed: "登録に失敗しました: "
        };
      }

      return {
        title: "LinkCampus Community",
        pageTitle: "Register",
        name: "Name",
        namePlaceholder: "Enter your name",
        email: "Email",
        emailPlaceholder: "Enter your email",
        password: "Password",
        passwordPlaceholder: "Enter your password",
        register: "Register",
        registering: "Registering...",
        alreadyHaveAccount: "Already have an account?",
        login: "Login",
        fillAllFields: "Please fill in all fields.",
        registerSuccess:
`Registration successful!

📩 A verification email has been sent to your inbox.
⚠️ If you cannot find it, please check your Spam / Junk folder.

After verifying your email, you can log in.`,
        registerFailed: "Registration failed: "
      };
    }

    function applyLanguage() {
      const lang = getCurrentLanguage();
      const t = getRegisterText(lang);

      document.documentElement.lang = lang;
      document.title = t.pageTitle;
      document.getElementById("siteTitle").innerText = t.title;
      document.getElementById("pageTitle").innerText = t.pageTitle;
      document.getElementById("nameLabel").innerText = t.name;
      document.getElementById("name").placeholder = t.namePlaceholder;
      document.getElementById("emailLabel").innerText = t.email;
      document.getElementById("email").placeholder = t.emailPlaceholder;
      document.getElementById("passwordLabel").innerText = t.password;
      document.getElementById("password").placeholder = t.passwordPlaceholder;
      document.getElementById("registerBtn").innerText = isRegistering ? t.registering : t.register;
      document.getElementById("loginText").innerText = t.alreadyHaveAccount;
      document.getElementById("loginLink").innerText = t.login;

      languageSwitcher.value = lang;
    }

    languageSwitcher.addEventListener("change", (e) => {
      setCurrentLanguage(e.target.value);
      applyLanguage();
    });

    async function registerUser() {
      if (isRegistering) return;

      const t = getRegisterText(getCurrentLanguage());

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const btn = document.getElementById("registerBtn");

      if (!name || !email || !password) {
        alert(t.fillAllFields);
        return;
      }

      try {
        isRegistering = true;
        btn.disabled = true;
        btn.innerText = t.registering;

        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await sendEmailVerification(user);

        await set(ref(db, "users/" + user.uid), {
          name: name,
          email: email,
          avatar: "",
          createdAt: Date.now()
        });

        alert(t.registerSuccess);
        window.location.href = "login.html";
      } catch (error) {
        alert(t.registerFailed + error.message);
        console.error(error);
      } finally {
        isRegistering = false;
        btn.disabled = false;
        btn.innerText = getRegisterText(getCurrentLanguage()).register;
      }
    }

    window.registerUser = registerUser;

    applyLanguage();
  </script>
</body>
</html>
