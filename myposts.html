<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Posts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 16px;
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .post {
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 0;
    }

    .post h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }

    .post p {
      margin: 6px 0;
      color: #374151;
    }

    .empty {
      color: #6b7280;
    }

    .delete-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #dc2626;
      color: white;
      cursor: pointer;
    }

    .avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      display: block;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Campus Language Exchange</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="partners.html">Find Partner</a>
      <a href="create.html">Create Post</a>
      <a href="myposts.html">My Posts</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="container">
    <h2>My Posts</h2>
    <div id="posts"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const container = document.getElementById("posts");
    let currentUser = null;
    let allPosts = [];

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      renderMyPosts();
    });

    onValue(ref(db, "posts"), (snapshot) => {
      allPosts = [];

      const data = snapshot.val();
      if (data) {
        Object.entries(data).forEach(([id, post]) => {
          allPosts.push({
            id,
            ...post
          });
        });

        allPosts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      }

      renderMyPosts();
    });

    async function deletePost(postId, postUid) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      if (currentUser.uid !== postUid) {
        alert("You can only delete your own posts.");
        return;
      }

      try {
        await remove(ref(db, "posts/" + postId));
        alert("Post deleted successfully.");
      } catch (error) {
        console.error(error);
        alert("Failed to delete post: " + error.message);
      }
    }

    function renderMyPosts() {
      if (!container) return;

      container.innerHTML = "";

      if (!currentUser) return;

      const myPosts = allPosts.filter(post => post.uid === currentUser.uid);

      if (myPosts.length === 0) {
        container.innerHTML = '<p class="empty">You have not posted anything yet.</p>';
        return;
      }

      myPosts.forEach((post) => {
        const div = document.createElement("div");
        div.className = "post";

        const avatarSrc = post.avatar && post.avatar.trim() !== ""
          ? post.avatar
          : "https://via.placeholder.com/60";

        div.innerHTML = `
          <img class="avatar-img" src="${avatarSrc}" alt="Avatar">
          <h3>👤 ${post.name || "Unknown User"}</h3>
          <p><strong>Speaks:</strong> ${post.speak || "Not provided"}</p>
          <p><strong>Learning:</strong> ${post.learn || "Not provided"}</p>
          <p><strong>Introduction:</strong> ${post.content || ""}</p>
          <p><strong>Contact:</strong> ${post.contact || "Not provided"}</p>
          <button class="delete-btn" data-id="${post.id}" data-uid="${post.uid}">Delete</button>
        `;

        container.appendChild(div);
      });

      document.querySelectorAll(".delete-btn").forEach((button) => {
        button.addEventListener("click", async (e) => {
          const postId = e.target.getAttribute("data-id");
          const postUid = e.target.getAttribute("data-uid");
          await deletePost(postId, postUid);
        });
      });
    }
  </script>
</body>
</html>
