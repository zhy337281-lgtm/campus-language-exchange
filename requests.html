<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend Requests</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: normal;
    }

    .language-switcher {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .request-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-link {
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      cursor: pointer;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #1d4ed8;
    }

    .name a {
      text-decoration: none;
      color: #1d4ed8;
    }

    .name a:hover {
      text-decoration: underline;
    }

    .time {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }

    .actions button {
      margin-left: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .accept-btn {
      background: #16a34a;
    }

    .reject-btn {
      background: #dc2626;
    }

    .empty {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <span id="pageTitle">Friend Requests</span>
    </div>

    <div class="nav-links">
      <a href="index.html" id="navHome">Home</a>
      <a href="partners.html" id="navFindPartner">Find Partner</a>
      <a href="requests.html" id="navRequests">Requests</a>
      <a href="friends.html" id="navFriends">Friends</a>
      <a href="chat-list.html" id="navChats">Chats</a>
      <a href="profile.html" id="navProfile">Profile</a>

      <select id="languageSwitcher" class="language-switcher">
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>

  <div class="container">
    <h2 id="heading">Friend Requests</h2>
    <div id="requests-container"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

    const container = document.getElementById("requests-container");
    const languageSwitcher = document.getElementById("languageSwitcher");

    let currentUser = null;
    let allRequests = [];

    function getRequestsText(lang) {
      if (lang === "ja") {
        return {
          pageTitle: "友達申請",
          home: "ホーム",
          findPartner: "パートナーを探す",
          requests: "申請",
          friends: "友達",
          chats: "チャット",
          profile: "プロフィール",
          heading: "友達申請",
          accept: "承認",
          reject: "拒否",
          noPending: "保留中の申請はありません。",
          pleaseLoginFirst: "先にログインしてください。",
          friendAdded: "友達を追加しました。",
          requestRejected: "申請を拒否しました。",
          failedToAccept: "申請の承認に失敗しました: ",
          failedToReject: "申請の拒否に失敗しました: ",
          unknownUser: "不明なユーザー"
        };
      }

      return {
        pageTitle: "Friend Requests",
        home: "Home",
        findPartner: "Find Partner",
        requests: "Requests",
        friends: "Friends",
        chats: "Chats",
        profile: "Profile",
        heading: "Friend Requests",
        accept: "Accept",
        reject: "Reject",
        noPending: "No pending requests.",
        pleaseLoginFirst: "Please login first.",
        friendAdded: "Friend added.",
        requestRejected: "Request rejected.",
        failedToAccept: "Failed to accept request: ",
        failedToReject: "Failed to reject request: ",
        unknownUser: "Unknown User"
      };
    }

    function t(key) {
      const lang = getCurrentLanguage();
      return getRequestsText(lang)[key] || key;
    }

    function applyLanguage() {
      const lang = getCurrentLanguage();
      const text = getRequestsText(lang);

      document.documentElement.lang = lang;
      document.title = text.pageTitle;
      document.getElementById("pageTitle").innerText = text.pageTitle;
      document.getElementById("navHome").innerText = text.home;
      document.getElementById("navFindPartner").innerText = text.findPartner;
      document.getElementById("navRequests").innerText = text.requests;
      document.getElementById("navFriends").innerText = text.friends;
      document.getElementById("navChats").innerText = text.chats;
      document.getElementById("navProfile").innerText = text.profile;
      document.getElementById("heading").innerText = text.heading;

      languageSwitcher.value = lang;
      renderRequests();
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      return new Date(timestamp).toLocaleString();
    }

    languageSwitcher.addEventListener("change", (e) => {
      setCurrentLanguage(e.target.value);
      applyLanguage();
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert(t("pleaseLoginFirst"));
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      renderRequests();
    });

    onValue(ref(db, "friendRequests"), (snapshot) => {
      allRequests = [];
      const data = snapshot.val() || {};

      Object.entries(data).forEach(([id, req]) => {
        allRequests.push({
          id,
          ...req
        });
      });

      allRequests.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      renderRequests();
    });

    async function acceptRequest(requestId, fromUid) {
      if (!currentUser) return;

      try {
        await set(ref(db, `friendRequests/${requestId}/status`), "accepted");
        await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), true);
        await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), true);

        alert(t("friendAdded"));
      } catch (error) {
        console.error(error);
        alert(t("failedToAccept") + error.message);
      }
    }

    async function rejectRequest(requestId) {
      try {
        await set(ref(db, `friendRequests/${requestId}/status`), "rejected");
        alert(t("requestRejected"));
      } catch (error) {
        console.error(error);
        alert(t("failedToReject") + error.message);
      }
    }

    function renderRequests() {
      if (!container) return;
      container.innerHTML = "";

      if (!currentUser) return;

      const receivedRequests = allRequests.filter(req =>
        req.toUid === currentUser.uid && req.status === "pending"
      );

      if (receivedRequests.length === 0) {
        container.innerHTML = `<p class="empty">${t("noPending")}</p>`;
        return;
      }

      receivedRequests.forEach(req => {
        const div = document.createElement("div");
        div.className = "request-card";

        const avatar = req.fromAvatar && req.fromAvatar.trim() !== ""
          ? req.fromAvatar
          : "https://via.placeholder.com/56";

        div.innerHTML = `
          <div class="left">
            <a href="user-profile.html?uid=${req.fromUid}" class="avatar-link">
              <img class="avatar" src="${avatar}" alt="avatar">
            </a>
            <div>
              <div class="name">
                <a href="user-profile.html?uid=${req.fromUid}">
                  ${req.fromName || t("unknownUser")}
                </a>
              </div>
              <div class="time">${formatTime(req.createdAt)}</div>
            </div>
          </div>

          <div class="actions">
            <button class="accept-btn" data-id="${req.id}" data-fromuid="${req.fromUid}">${t("accept")}</button>
            <button class="reject-btn" data-id="${req.id}">${t("reject")}</button>
          </div>
        `;

        container.appendChild(div);
      });

      document.querySelectorAll(".accept-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const requestId = e.target.getAttribute("data-id");
          const fromUid = e.target.getAttribute("data-fromuid");
          await acceptRequest(requestId, fromUid);
        });
      });

      document.querySelectorAll(".reject-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const requestId = e.target.getAttribute("data-id");
          await rejectRequest(requestId);
        });
      });
    }

    applyLanguage();
  </script>
</body>
</html>
