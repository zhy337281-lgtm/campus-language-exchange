<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend Requests</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 16px;
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .request-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .time {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }

    .actions button {
      margin-left: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .accept-btn {
      background: #16a34a;
    }

    .reject-btn {
      background: #dc2626;
    }

    .empty {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Campus Language Exchange</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="partners.html">Find Partner</a>
      <a href="requests.html">Requests</a>
      <a href="friends.html">Friends</a>
      <a href="chat-list.html">Chats</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="container">
    <h2>Friend Requests</h2>
    <div id="requests-container"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const container = document.getElementById("requests-container");
    let currentUser = null;
    let allRequests = [];

    function formatTime(timestamp) {
      if (!timestamp) return "";
      return new Date(timestamp).toLocaleString();
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      renderRequests();
    });

    onValue(ref(db, "friendRequests"), (snapshot) => {
      allRequests = [];
      const data = snapshot.val() || {};

      Object.entries(data).forEach(([id, req]) => {
        allRequests.push({
          id,
          ...req
        });
      });

      allRequests.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      renderRequests();
    });

    async function acceptRequest(requestId, fromUid) {
      if (!currentUser) return;

      try {
        await set(ref(db, `friendRequests/${requestId}/status`), "accepted");
        await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), true);
        await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), true);

        alert("Friend added.");
      } catch (error) {
        console.error(error);
        alert("Failed to accept request: " + error.message);
      }
    }

    async function rejectRequest(requestId) {
      try {
        await set(ref(db, `friendRequests/${requestId}/status`), "rejected");
        alert("Request rejected.");
      } catch (error) {
        console.error(error);
        alert("Failed to reject request: " + error.message);
      }
    }

    function renderRequests() {
      if (!container) return;
      container.innerHTML = "";

      if (!currentUser) return;

      const receivedRequests = allRequests.filter(req =>
        req.toUid === currentUser.uid && req.status === "pending"
      );

      if (receivedRequests.length === 0) {
        container.innerHTML = `<p class="empty">No pending requests.</p>`;
        return;
      }

      receivedRequests.forEach(req => {
        const div = document.createElement("div");
        div.className = "request-card";

        const avatar = req.fromAvatar && req.fromAvatar.trim() !== ""
          ? req.fromAvatar
          : "https://via.placeholder.com/56";

        div.innerHTML = `
          <div class="left">
            <img class="avatar" src="${avatar}" alt="avatar">
            <div>
              <div class="name">${req.fromName || "Unknown User"}</div>
              <div class="time">${formatTime(req.createdAt)}</div>
            </div>
          </div>

          <div class="actions">
            <button class="accept-btn" data-id="${req.id}" data-fromuid="${req.fromUid}">Accept</button>
            <button class="reject-btn" data-id="${req.id}">Reject</button>
          </div>
        `;

        container.appendChild(div);
      });

      document.querySelectorAll(".accept-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const requestId = e.target.getAttribute("data-id");
          const fromUid = e.target.getAttribute("data-fromuid");
          await acceptRequest(requestId, fromUid);
        });
      });

      document.querySelectorAll(".reject-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const requestId = e.target.getAttribute("data-id");
          await rejectRequest(requestId);
        });
      });
    }
  </script>
</body>
</html>
