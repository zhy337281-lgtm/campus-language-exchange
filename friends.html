<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      margin-left: 0;
    }

    .language-switcher {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .top-actions {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    .top-actions button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .friend-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-link {
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      cursor: pointer;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      color: #1d4ed8;
    }

    .name a {
      text-decoration: none;
      color: #1d4ed8;
    }

    .name a:hover {
      text-decoration: underline;
    }

    .meta {
      color: #6b7280;
      font-size: 14px;
      margin-top: 4px;
    }

    .message-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .empty {
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <div class="nav-left">
      <span id="pageTitle">Friends</span>
    </div>

    <div class="nav-links">
      <a href="index.html" id="navHome">Home</a>
      <a href="partners.html" id="navFindPartner">Find Partner</a>
      <a href="requests.html" id="navRequests">Requests</a>
      <a href="friends.html" id="navFriends">Friends</a>
      <a href="chat-list.html" id="navChats">Chats</a>
      <a href="profile.html" id="navProfile">Profile</a>

      <select id="languageSwitcher" class="language-switcher">
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </div>

  <div class="container">
    <h2 id="heading">My Friends</h2>

    <div class="top-actions">
      <button id="addFriendByEmailBtn" onclick="window.location.href='add-friend-by-email.html'">
        ➕ Add Friend by Email
      </button>
    </div>

    <div id="friends-container"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, get, push, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

    const container = document.getElementById("friends-container");
    const languageSwitcher = document.getElementById("languageSwitcher");
    let currentUser = null;

    function getFriendsText(lang) {
      if (lang === "ja") {
        return {
          pageTitle: "友達",
          home: "ホーム",
          findPartner: "パートナーを探す",
          requests: "申請",
          friends: "友達",
          chats: "チャット",
          profile: "プロフィール",
          heading: "友達一覧",
          addFriendByEmail: "➕ メールで友達追加",
          message: "メッセージ",
          noFriendsYet: "まだ友達がいません。",
          pleaseLoginFirst: "先にログインしてください。",
          unknownUser: "不明なユーザー"
        };
      }

      return {
        pageTitle: "Friends",
        home: "Home",
        findPartner: "Find Partner",
        requests: "Requests",
        friends: "Friends",
        chats: "Chats",
        profile: "Profile",
        heading: "My Friends",
        addFriendByEmail: "➕ Add Friend by Email",
        message: "Message",
        noFriendsYet: "You have no friends yet.",
        pleaseLoginFirst: "Please login first.",
        unknownUser: "Unknown User"
      };
    }

    function t(key) {
      const lang = getCurrentLanguage();
      return getFriendsText(lang)[key] || key;
    }

    function applyLanguage() {
      const lang = getCurrentLanguage();
      const text = getFriendsText(lang);

      document.documentElement.lang = lang;
      document.title = text.pageTitle;
      document.getElementById("pageTitle").innerText = text.pageTitle;
      document.getElementById("navHome").innerText = text.home;
      document.getElementById("navFindPartner").innerText = text.findPartner;
      document.getElementById("navRequests").innerText = text.requests;
      document.getElementById("navFriends").innerText = text.friends;
      document.getElementById("navChats").innerText = text.chats;
      document.getElementById("navProfile").innerText = text.profile;
      document.getElementById("heading").innerText = text.heading;
      document.getElementById("addFriendByEmailBtn").innerText = text.addFriendByEmail;

      languageSwitcher.value = lang;
      if (currentUser) loadFriends();
    }

    languageSwitcher.addEventListener("change", (e) => {
      setCurrentLanguage(e.target.value);
      applyLanguage();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert(t("pleaseLoginFirst"));
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      await loadFriends();
    });

    async function openPrivateChat(targetUid) {
      if (!currentUser) return;

      const chatsSnapshot = await get(ref(db, "chats"));
      const chats = chatsSnapshot.val() || {};

      let foundChatId = null;

      for (const [chatId, chat] of Object.entries(chats)) {
        if (
          chat.type === "private" &&
          chat.memberIds &&
          chat.memberIds[currentUser.uid] &&
          chat.memberIds[targetUid]
        ) {
          foundChatId = chatId;
          break;
        }
      }

      if (!foundChatId) {
        const newChatRef = push(ref(db, "chats"));
        foundChatId = newChatRef.key;

        await set(newChatRef, {
          type: "private",
          memberIds: {
            [currentUser.uid]: true,
            [targetUid]: true
          },
          memberList: [currentUser.uid, targetUid],
          createdAt: Date.now(),
          lastMessage: "",
          lastMessageAt: Date.now()
        });
      }

      window.location.href = `chat.html?chatId=${foundChatId}`;
    }

    async function loadFriends() {
      const friendsSnapshot = await get(ref(db, `friends/${currentUser.uid}`));
      const usersSnapshot = await get(ref(db, "users"));

      const friendsData = friendsSnapshot.val() || {};
      const usersData = usersSnapshot.val() || {};

      const friendUids = Object.keys(friendsData);

      if (friendUids.length === 0) {
        container.innerHTML = `<p class="empty">${t("noFriendsYet")}</p>`;
        return;
      }

      container.innerHTML = "";

      friendUids.forEach(uid => {
        const userData = usersData[uid];
        if (!userData) return;

        const avatar = userData.avatar || "https://via.placeholder.com/56";

        const div = document.createElement("div");
        div.className = "friend-card";

        div.innerHTML = `
          <div class="left">
            <a href="user-profile.html?uid=${uid}" class="avatar-link">
              <img class="avatar" src="${avatar}" alt="avatar">
            </a>

            <div>
              <div class="name">
                <a href="user-profile.html?uid=${uid}">
                  ${userData.name || t("unknownUser")}
                </a>
              </div>
              <div class="meta">${userData.email || ""}</div>
            </div>
          </div>

          <button class="message-btn" data-uid="${uid}">
            ${t("message")}
          </button>
        `;

        container.appendChild(div);
      });

      document.querySelectorAll(".message-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const targetUid = e.target.getAttribute("data-uid");
          await openPrivateChat(targetUid);
        });
      });
    }

    applyLanguage();
  </script>
</body>
</html>
