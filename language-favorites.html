<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Exchange Favorites</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: normal;
    }

    #userInfo {
      font-size: 16px;
      font-weight: normal;
    }

    .language-switcher {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .profile-card h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }

    .profile-card p {
      margin: 6px 0;
      color: #374151;
      line-height: 1.6;
    }

    .avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      display: block;
      margin-bottom: 12px;
    }

    .action-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .like-btn,
    .favorite-btn,
    .friend-btn,
    .message-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .like-btn { background: #dc2626; }
    .favorite-btn { background: #d97706; }
    .friend-btn { background: #16a34a; }
    .message-btn { background: #7c3aed; }

    .empty {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <span id="pageTitle">Language Exchange Favorites</span>
    </div>

    <div class="nav-links">
      <a href="index.html" id="navHome">Home</a>
      <a href="language-exchange.html" id="navLanguageExchange">Language Exchange</a>
      <a href="friends.html" id="navFriends">Friends</a>
      <a href="chat-list.html" id="navChats">Chats</a>
      <a href="profile.html" id="navProfile">Profile</a>

      <select id="languageSwitcher" class="language-switcher">
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>

      <span id="userInfo"></span>
      <a href="login.html" id="authLink">Login</a>
    </div>
  </div>

  <div class="container">
    <h2 id="heading">Favorite List</h2>
    <div id="favoritesContainer" class="empty">Loading favorites...</div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, onValue, get, remove, set, push } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

    const userInfo = document.getElementById("userInfo");
    const authLink = document.getElementById("authLink");
    const favoritesContainer = document.getElementById("favoritesContainer");
    const languageSwitcher = document.getElementById("languageSwitcher");

    let currentUser = null;
    let currentProfile = null;
    let allPosts = {};
    let myFavorites = {};
    let allLikes = {};
    let myFriends = {};

    function getFavoritesText(lang) {
      if (lang === "ja") {
        return {
          pageTitle: "言語交流お気に入り",
          heading: "お気に入り一覧",
          home: "ホーム",
          languageExchange: "Language Exchange",
          friends: "友達",
          chats: "チャット",
          profile: "プロフィール",
          login: "ログイン",
          logout: "ログアウト",
          loading: "お気に入りを読み込み中...",
          pleaseLoginFirst: "先にログインしてください。",
          noFavoritesYet: "まだお気に入りの言語交流投稿はありません。",
          unknownUser: "不明なユーザー",
          speaks: "話せる言語",
          learning: "学びたい言語",
          introduction: "自己紹介",
          contact: "連絡先",
          notProvided: "未設定",
          like: "いいね",
          unlike: "いいね解除",
          favorite: "お気に入り",
          unfavorite: "お気に入り解除",
          addFriend: "友達追加",
          friendsStatus: "友達",
          message: "メッセージ",
          youCannotAddYourself: "自分自身は追加できません。",
          youAreAlreadyFriends: "すでに友達です。",
          friendRequestExists: "すでに友達申請があります。",
          friendRequestSent: "友達申請を送りました。",
          failedToSendFriendRequest: "友達申請の送信に失敗しました: ",
          failedToOpenChat: "チャットを開けませんでした: "
        };
      }

      return {
        pageTitle: "Language Exchange Favorites",
        heading: "Favorite List",
        home: "Home",
        languageExchange: "Language Exchange",
        friends: "Friends",
        chats: "Chats",
        profile: "Profile",
        login: "Login",
        logout: "Logout",
        loading: "Loading favorites...",
        pleaseLoginFirst: "Please login first.",
        noFavoritesYet: "No favorite language exchange posts yet.",
        unknownUser: "Unknown User",
        speaks: "Speaks",
        learning: "Learning",
        introduction: "Introduction",
        contact: "Contact",
        notProvided: "Not provided",
        like: "Like",
        unlike: "Unlike",
        favorite: "Favorite",
        unfavorite: "Unfavorite",
        addFriend: "Add Friend",
        friendsStatus: "Friends",
        message: "Message",
        youCannotAddYourself: "You cannot add yourself.",
        youAreAlreadyFriends: "You are already friends.",
        friendRequestExists: "A friend request already exists.",
        friendRequestSent: "Friend request sent.",
        failedToSendFriendRequest: "Failed to send friend request: ",
        failedToOpenChat: "Failed to open chat: "
      };
    }

    function t(key) {
      return getFavoritesText(getCurrentLanguage())[key] || key;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function applyLanguage() {
      const lang = getCurrentLanguage();
      const text = getFavoritesText(lang);

      document.documentElement.lang = lang;
      document.title = text.pageTitle;
      document.getElementById("pageTitle").innerText = text.pageTitle;
      document.getElementById("heading").innerText = text.heading;
      document.getElementById("navHome").innerText = text.home;
      document.getElementById("navLanguageExchange").innerText = text.languageExchange;
      document.getElementById("navFriends").innerText = text.friends;
      document.getElementById("navChats").innerText = text.chats;
      document.getElementById("navProfile").innerText = text.profile;

      if (authLink.dataset.loggedIn === "true") {
        authLink.innerText = text.logout;
      } else {
        authLink.innerText = text.login;
      }

      if (!currentUser) {
        favoritesContainer.innerHTML = '<p class="empty">' + text.pleaseLoginFirst + '</p>';
      }

      languageSwitcher.value = lang;
      renderFavorites();
    }

    languageSwitcher.addEventListener("change", (e) => {
      setCurrentLanguage(e.target.value);
      applyLanguage();
    });

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;

      if (user) {
        try {
          const snapshot = await get(ref(db, "users/" + user.uid));
          currentProfile = snapshot.exists() ? snapshot.val() : null;
          userInfo.innerText = "👤 " + (currentProfile?.name || user.email);
        } catch (error) {
          console.error(error);
          userInfo.innerText = "👤 " + user.email;
        }

        onValue(ref(db, `postFavorites/${user.uid}`), (snapshot) => {
          myFavorites = snapshot.val() || {};
          renderFavorites();
        });

        onValue(ref(db, `friends/${user.uid}`), (snapshot) => {
          myFriends = snapshot.val() || {};
          renderFavorites();
        });

        authLink.dataset.loggedIn = "true";
        authLink.innerText = t("logout");
        authLink.href = "#";
        authLink.onclick = async (e) => {
          e.preventDefault();
          await signOut(auth);
          window.location.href = "login.html";
        };
      } else {
        currentProfile = null;
        myFavorites = {};
        myFriends = {};
        userInfo.innerText = "";
        authLink.dataset.loggedIn = "false";
        authLink.innerText = t("login");
        authLink.href = "login.html";
        authLink.onclick = null;
      }

      renderFavorites();
    });

    onValue(ref(db, "posts"), (snapshot) => {
      allPosts = snapshot.val() || {};
      renderFavorites();
    });

    onValue(ref(db, "postLikes"), (snapshot) => {
      allLikes = snapshot.val() || {};
      renderFavorites();
    });

    async function toggleLike(postId) {
      if (!currentUser) {
        alert(t("pleaseLoginFirst"));
        return;
      }

      const likeRef = ref(db, `postLikes/${postId}/${currentUser.uid}`);
      const snapshot = await get(likeRef);

      if (snapshot.exists()) {
        await remove(likeRef);
      } else {
        await set(likeRef, true);
      }
    }

    async function toggleFavorite(postId) {
      if (!currentUser) {
        alert(t("pleaseLoginFirst"));
        return;
      }

      const favRef = ref(db, `postFavorites/${currentUser.uid}/${postId}`);
      const snapshot = await get(favRef);

      if (snapshot.exists()) {
        await remove(favRef);
      } else {
        await set(favRef, true);
      }
    }

    async function sendFriendRequest(targetUid, targetName, targetAvatar) {
      if (!currentUser) {
        alert(t("pleaseLoginFirst"));
        return;
      }

      if (currentUser.uid === targetUid) {
        alert(t("youCannotAddYourself"));
        return;
      }

      try {
        const friendsSnapshot = await get(ref(db, `friends/${currentUser.uid}`));
        const currentFriends = friendsSnapshot.val() || {};

        if (currentFriends[targetUid]) {
          alert(t("youAreAlreadyFriends"));
          return;
        }

        const requestsSnapshot = await get(ref(db, "friendRequests"));
        const existing = requestsSnapshot.val() || {};

        const duplicate = Object.values(existing).some(req =>
          (
            req.fromUid === currentUser.uid &&
            req.toUid === targetUid &&
            req.status === "pending"
          ) ||
          (
            req.fromUid === targetUid &&
            req.toUid === currentUser.uid &&
            req.status === "pending"
          )
        );

        if (duplicate) {
          alert(t("friendRequestExists"));
          return;
        }

        const newRequestRef = push(ref(db, "friendRequests"));

        await set(newRequestRef, {
          fromUid: currentUser.uid,
          fromName: currentProfile?.name || currentUser.email,
          fromAvatar: currentProfile?.avatar || "",
          toUid: targetUid,
          toName: targetName || "",
          toAvatar: targetAvatar || "",
          status: "pending",
          createdAt: Date.now()
        });

        alert(t("friendRequestSent"));
      } catch (error) {
        console.error(error);
        alert(t("failedToSendFriendRequest") + error.message);
      }
    }

    async function openPrivateChat(targetUid) {
      if (!currentUser) {
        alert(t("pleaseLoginFirst"));
        return;
      }

      try {
        const chatsSnapshot = await get(ref(db, "chats"));
        const chats = chatsSnapshot.val() || {};

        let foundChatId = null;

        for (const [chatId, chat] of Object.entries(chats)) {
          if (
            chat.type === "private" &&
            chat.memberIds &&
            chat.memberIds[currentUser.uid] &&
            chat.memberIds[targetUid]
          ) {
            foundChatId = chatId;
            break;
          }
        }

        if (!foundChatId) {
          const newChatRef = push(ref(db, "chats"));
          foundChatId = newChatRef.key;

          await set(newChatRef, {
            type: "private",
            memberIds: {
              [currentUser.uid]: true,
              [targetUid]: true
            },
            memberList: [currentUser.uid, targetUid],
            createdAt: Date.now(),
            lastMessage: "",
            lastMessageAt: Date.now()
          });
        }

        window.location.href = "chat.html?chatId=" + foundChatId;
      } catch (error) {
        console.error(error);
        alert(t("failedToOpenChat") + error.message);
      }
    }

    function renderFavorites() {
      if (!favoritesContainer) return;

      if (!currentUser) {
        favoritesContainer.innerHTML = '<p class="empty">' + t("pleaseLoginFirst") + '</p>';
        return;
      }

      const favoritePostIds = Object.keys(myFavorites || {});

      if (favoritePostIds.length === 0) {
        favoritesContainer.innerHTML = '<p class="empty">' + t("noFavoritesYet") + '</p>';
        return;
      }

      favoritesContainer.innerHTML = "";

      favoritePostIds.forEach(postId => {
        const post = allPosts[postId];
        if (!post) return;

        const avatarSrc = post.avatar && post.avatar.trim() !== ""
          ? post.avatar
          : "https://via.placeholder.com/60";

        const likeCount = allLikes[postId] ? Object.keys(allLikes[postId]).length : 0;
        const liked = currentUser && allLikes[postId] && allLikes[postId][currentUser.uid];
        const favorited = currentUser && myFavorites[postId];
        const alreadyFriend = myFriends && myFriends[post.uid];

        const card = document.createElement("div");
        card.className = "profile-card";

        card.innerHTML = `
          <img class="avatar-img" src="${avatarSrc}" alt="Avatar">
          <h3>👤 ${escapeHtml(post.name || t("unknownUser"))}</h3>
          <p><strong>${t("speaks")}:</strong> ${escapeHtml(post.speak || t("notProvided"))}</p>
          <p><strong>${t("learning")}:</strong> ${escapeHtml(post.learn || t("notProvided"))}</p>
          <p><strong>${t("introduction")}:</strong> ${escapeHtml(post.content || "")}</p>
          <p><strong>${t("contact")}:</strong> ${escapeHtml(post.contact || t("notProvided"))}</p>

          <div class="action-row">
            <button class="like-btn" onclick="handleToggleLike('${postId}')">
              ${liked ? t("unlike") : t("like")} (${likeCount})
            </button>

            <button class="favorite-btn" onclick="handleToggleFavorite('${postId}')">
              ${favorited ? t("unfavorite") : t("favorite")}
            </button>

            ${
              currentUser && currentUser.uid !== post.uid
                ? `
                  ${
                    alreadyFriend
                      ? `<button class="friend-btn" style="background:#9ca3af; cursor:default;" disabled>${t("friendsStatus")}</button>`
                      : `<button class="friend-btn" onclick="handleFriendRequest('${post.uid}', '${escapeHtml(post.name || "")}', '${post.avatar || ""}')">${t("addFriend")}</button>`
                  }

                  <button class="message-btn" onclick="handleMessage('${post.uid}')">
                    ${t("message")}
                  </button>
                `
                : ""
            }
          </div>
        `;

        favoritesContainer.appendChild(card);
      });
    }

    window.handleToggleLike = toggleLike;
    window.handleToggleFavorite = toggleFavorite;
    window.handleFriendRequest = sendFriendRequest;
    window.handleMessage = openPrivateChat;

    applyLanguage();
  </script>
</body>
</html>
