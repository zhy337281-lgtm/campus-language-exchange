<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Exchange Favorites</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: normal;
    }

    #userInfo {
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .profile-card h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }

    .profile-card p {
      margin: 6px 0;
      color: #374151;
    }

    .avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      display: block;
      margin-bottom: 12px;
    }

    .action-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .like-btn,
    .favorite-btn,
    .friend-btn,
    .message-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .like-btn { background: #dc2626; }
    .favorite-btn { background: #d97706; }
    .friend-btn { background: #16a34a; }
    .message-btn { background: #7c3aed; }

    .empty {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Language Exchange Favorites</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="language-exchange.html">Language Exchange</a>
      <a href="friends.html">Friends</a>
      <a href="chat-list.html">Chats</a>
      <a href="profile.html">Profile</a>
      <span id="userInfo"></span>
      <a href="login.html" id="authLink">Login</a>
    </div>
  </div>

  <div class="container">
    <div id="favoritesContainer" class="empty">Loading favorites...</div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, onValue, get, remove, set, push } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const userInfo = document.getElementById("userInfo");
    const authLink = document.getElementById("authLink");
    const favoritesContainer = document.getElementById("favoritesContainer");

    let currentUser = null;
    let currentProfile = null;
    let allPosts = {};
    let myFavorites = {};
    let allLikes = {};

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;

      if (user) {
        try {
          const snapshot = await get(ref(db, "users/" + user.uid));
          currentProfile = snapshot.exists() ? snapshot.val() : null;
          userInfo.innerText = "👤 " + (currentProfile?.name || user.email);
        } catch (error) {
          console.error(error);
          userInfo.innerText = "👤 " + user.email;
        }

        onValue(ref(db, `postFavorites/${user.uid}`), (snapshot) => {
          myFavorites = snapshot.val() || {};
          renderFavorites();
        });

        authLink.innerText = "Logout";
        authLink.href = "#";
        authLink.onclick = async (e) => {
          e.preventDefault();
          await signOut(auth);
          window.location.href = "login.html";
        };
      } else {
        currentProfile = null;
        myFavorites = {};
        userInfo.innerText = "";
        authLink.innerText = "Login";
        authLink.href = "login.html";
        authLink.onclick = null;
        renderFavorites();
      }
    });

    onValue(ref(db, "posts"), (snapshot) => {
      allPosts = snapshot.val() || {};
      renderFavorites();
    });

    onValue(ref(db, "postLikes"), (snapshot) => {
      allLikes = snapshot.val() || {};
      renderFavorites();
    });

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function toggleLike(postId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const likeRef = ref(db, `postLikes/${postId}/${currentUser.uid}`);
      const snapshot = await get(likeRef);

      if (snapshot.exists()) {
        await remove(likeRef);
      } else {
        await set(likeRef, true);
      }
    }

    async function toggleFavorite(postId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const favRef = ref(db, `postFavorites/${currentUser.uid}/${postId}`);
      const snapshot = await get(favRef);

      if (snapshot.exists()) {
        await remove(favRef);
      } else {
        await set(favRef, true);
      }
    }

    async function sendFriendRequest(targetUid, targetName, targetAvatar) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      if (currentUser.uid === targetUid) {
        alert("You cannot add yourself.");
        return;
      }

      try {
        const friendsSnapshot = await get(ref(db, `friends/${currentUser.uid}`));
        const myFriends = friendsSnapshot.val() || {};

        if (myFriends[targetUid]) {
          alert("You are already friends.");
          return;
        }

        const requestsSnapshot = await get(ref(db, "friendRequests"));
        const existing = requestsSnapshot.val() || {};

        const duplicate = Object.values(existing).some(req =>
          (
            req.fromUid === currentUser.uid &&
            req.toUid === targetUid &&
            req.status === "pending"
          ) ||
          (
            req.fromUid === targetUid &&
            req.toUid === currentUser.uid &&
            req.status === "pending"
          )
        );

        if (duplicate) {
          alert("A friend request already exists.");
          return;
        }

        const newRequestRef = push(ref(db, "friendRequests"));

        await set(newRequestRef, {
          fromUid: currentUser.uid,
          fromName: currentProfile?.name || currentUser.email,
          fromAvatar: currentProfile?.avatar || "",
          toUid: targetUid,
          toName: targetName || "",
          toAvatar: targetAvatar || "",
          status: "pending",
          createdAt: Date.now()
        });

        alert("Friend request sent.");
      } catch (error) {
        console.error(error);
        alert("Failed to send friend request: " + error.message);
      }
    }

    async function openPrivateChat(targetUid) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      try {
        const chatsSnapshot = await get(ref(db, "chats"));
        const chats = chatsSnapshot.val() || {};

        let foundChatId = null;

        for (const [chatId, chat] of Object.entries(chats)) {
          if (
            chat.type === "private" &&
            chat.memberIds &&
            chat.memberIds[currentUser.uid] &&
            chat.memberIds[targetUid]
          ) {
            foundChatId = chatId;
            break;
          }
        }

        if (!foundChatId) {
          const newChatRef = push(ref(db, "chats"));
          foundChatId = newChatRef.key;

          await set(newChatRef, {
            type: "private",
            memberIds: {
              [currentUser.uid]: true,
              [targetUid]: true
            },
            memberList: [currentUser.uid, targetUid],
            createdAt: Date.now(),
            lastMessage: "",
            lastMessageAt: Date.now()
          });
        }

        window.location.href = `chat.html?chatId=${foundChatId}`;
      } catch (error) {
        console.error(error);
        alert("Failed to open chat: " + error.message);
      }
    }

    function renderFavorites() {
      if (!favoritesContainer) return;

      if (!currentUser) {
        favoritesContainer.innerHTML = `<p class="empty">Please login first.</p>`;
        return;
      }

      const favoritePostIds = Object.keys(myFavorites || {});

      if (favoritePostIds.length === 0) {
        favoritesContainer.innerHTML = `<p class="empty">No favorite language exchange posts yet.</p>`;
        return;
      }

      favoritesContainer.innerHTML = "";

      favoritePostIds.forEach(postId => {
        const post = allPosts[postId];
        if (!post) return;

        const avatarSrc = post.avatar && post.avatar.trim() !== ""
          ? post.avatar
          : "https://via.placeholder.com/60";

        const likeCount = allLikes[postId] ? Object.keys(allLikes[postId]).length : 0;
        const liked = currentUser && allLikes[postId] && allLikes[postId][currentUser.uid];
        const favorited = currentUser && myFavorites[postId];

        const card = document.createElement("div");
        card.className = "profile-card";

        card.innerHTML = `
          <img class="avatar-img" src="${avatarSrc}" alt="Avatar">
          <h3>👤 ${escapeHtml(post.name || "Unknown User")}</h3>
          <p><strong>Speaks:</strong> ${escapeHtml(post.speak || "Not provided")}</p>
          <p><strong>Learning:</strong> ${escapeHtml(post.learn || "Not provided")}</p>
          <p><strong>Introduction:</strong> ${escapeHtml(post.content || "")}</p>
          <p><strong>Contact:</strong> ${escapeHtml(post.contact || "Not provided")}</p>

          <div class="action-row">
            <button class="like-btn" onclick="handleToggleLike('${postId}')">
              ${liked ? "Unlike" : "Like"} (${likeCount})
            </button>

            <button class="favorite-btn" onclick="handleToggleFavorite('${postId}')">
              ${favorited ? "Unfavorite" : "Favorite"}
            </button>

            ${
              currentUser && currentUser.uid !== post.uid
                ? `
                  <button class="friend-btn" onclick="handleFriendRequest('${post.uid}', '${escapeHtml(post.name || "")}', '${post.avatar || ""}')">
                    Add Friend
                  </button>

                  <button class="message-btn" onclick="handleMessage('${post.uid}')">
                    Message
                  </button>
                `
                : ""
            }
          </div>
        `;

        favoritesContainer.appendChild(card);
      });
    }

    window.handleToggleLike = toggleLike;
    window.handleToggleFavorite = toggleFavorite;
    window.handleFriendRequest = sendFriendRequest;
    window.handleMessage = openPrivateChat;
  </script>
</body>
</html>
