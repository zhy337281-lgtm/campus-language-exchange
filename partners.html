<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Partners</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 16px;
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .profile-card h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }

    .profile-card p {
      margin: 6px 0;
      color: #374151;
    }

    .delete-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #dc2626;
      color: white;
      cursor: pointer;
    }

    .avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      display: block;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Campus Language Exchange</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="partners.html">Find Partner</a>
      <a href="create.html">Create Post</a>
      <a href="myposts.html">My Posts</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="container">
    <h1>Find Language Partners</h1>

    <div class="filters">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by language or name..."
      />
    </div>

    <div id="posts-container"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    let currentUser = null;
    let allPosts = [];

    onAuthStateChanged(auth, (user) => {
      currentUser = user || null;
      renderPosts();
    });

    const postsRef = ref(db, "posts");

    onValue(postsRef, (snapshot) => {
      allPosts = [];

      const data = snapshot.val();
      if (data) {
        Object.entries(data).forEach(([id, post]) => {
          allPosts.push({
            id,
            ...post
          });
        });

        allPosts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      }

      renderPosts();
    });

    async function deletePost(postId, postUid) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      if (currentUser.uid !== postUid) {
        alert("You can only delete your own posts.");
        return;
      }

      try {
        await remove(ref(db, "posts/" + postId));
        alert("Post deleted successfully.");
      } catch (error) {
        console.error(error);
        alert("Failed to delete post: " + error.message);
      }
    }

    function renderPosts() {
      const container = document.getElementById("posts-container");
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      container.innerHTML = "";

      const filteredPosts = allPosts.filter(post =>
        (post.name || "").toLowerCase().includes(keyword) ||
        (post.speak || "").toLowerCase().includes(keyword) ||
        (post.learn || "").toLowerCase().includes(keyword) ||
        (post.content || "").toLowerCase().includes(keyword) ||
        (post.contact || "").toLowerCase().includes(keyword)
      );

      if (filteredPosts.length === 0) {
        container.innerHTML = "<p>No matching posts found.</p>";
        return;
      }

      filteredPosts.forEach((post) => {
        const card = document.createElement("div");
        card.className = "profile-card";

        const avatarSrc = post.avatar && post.avatar.trim() !== ""
          ? post.avatar
          : "https://via.placeholder.com/60";

        const canDelete = currentUser && currentUser.uid === post.uid;

        card.innerHTML = `
          <img class="avatar-img" src="${avatarSrc}" alt="Avatar">
          <h3>👤 ${post.name || "Unknown User"}</h3>
          <p><strong>Speaks:</strong> ${post.speak || "Not provided"}</p>
          <p><strong>Learning:</strong> ${post.learn || "Not provided"}</p>
          <p><strong>Introduction:</strong> ${post.content || ""}</p>
          <p><strong>Contact:</strong> ${post.contact || "Not provided"}</p>
          ${canDelete ? `<button class="delete-btn" data-id="${post.id}" data-uid="${post.uid}">Delete</button>` : ""}
        `;

        container.appendChild(card);
      });

      document.querySelectorAll(".delete-btn").forEach((button) => {
        button.addEventListener("click", async (e) => {
          const postId = e.target.getAttribute("data-id");
          const postUid = e.target.getAttribute("data-uid");
          await deletePost(postId, postUid);
        });
      });
    }

    document.getElementById("searchInput").addEventListener("input", renderPosts);
  </script>
</body>
</html>
