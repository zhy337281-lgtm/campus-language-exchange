<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Partners</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 16px;
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .profile-card h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }

    .profile-card p {
      margin: 6px 0;
      color: #374151;
    }

    .delete-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #dc2626;
      color: white;
      cursor: pointer;
    }

    .avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      display: block;
      margin-bottom: 12px;
    }

    .comments-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
    }

    .comments-section h4 {
      margin: 0 0 10px 0;
      color: #111827;
    }

    .comments-list {
      margin-bottom: 12px;
    }

    .comment-item {
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .comment-meta {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .comment-text {
      color: #111827;
      word-break: break-word;
    }

    .comment-input-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .comment-input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .comment-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    .empty-comment {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Campus Language Exchange</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="partners.html">Find Partner</a>
      <a href="create.html">Create Post</a>
      <a href="myposts.html">My Posts</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="container">
    <h1>Find Language Partners</h1>

    <div class="filters">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by language or name..."
      />
    </div>

    <div id="posts-container"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import {
      ref,
      onValue,
      remove,
      push,
      set,
      get
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    let currentUser = null;
    let currentProfile = null;
    let allPosts = [];
    let allComments = {};

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;

      if (currentUser) {
        try {
          const userSnapshot = await get(ref(db, "users/" + currentUser.uid));
          currentProfile = userSnapshot.exists() ? userSnapshot.val() : null;
        } catch (error) {
          console.error("Failed to load current user profile:", error);
          currentProfile = null;
        }
      } else {
        currentProfile = null;
      }

      renderPosts();
    });

    onValue(ref(db, "posts"), (snapshot) => {
      allPosts = [];

      const data = snapshot.val();
      if (data) {
        Object.entries(data).forEach(([id, post]) => {
          allPosts.push({
            id,
            ...post
          });
        });

        allPosts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      }

      renderPosts();
    });

    onValue(ref(db, "comments"), (snapshot) => {
      allComments = snapshot.val() || {};
      renderPosts();
    });

    async function deletePost(postId, postUid) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      if (currentUser.uid !== postUid) {
        alert("You can only delete your own posts.");
        return;
      }

      try {
        await remove(ref(db, "posts/" + postId));
        await remove(ref(db, "comments/" + postId));
        alert("Post deleted successfully.");
      } catch (error) {
        console.error(error);
        alert("Failed to delete post: " + error.message);
      }
    }

    async function submitComment(postId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const input = document.getElementById(`comment-input-${postId}`);
      if (!input) return;

      const text = input.value.trim();

      if (!text) {
        alert("Please write a comment.");
        return;
      }

      try {
        const newCommentRef = push(ref(db, "comments/" + postId));

       await set(newCommentRef, {
  uid: currentUser.uid,
  name: currentProfile?.name || currentUser.email || "Anonymous",
  avatar: currentProfile?.avatar || "",
  text: text,
  createdAt: Date.now()
});
    async function deleteComment(postId, commentId) {
  if (!currentUser) {
    alert("Please login first.");
    return;
  }

  try {
    const commentRef = ref(db, `comments/${postId}/${commentId}`);
    const snapshot = await get(commentRef);

    if (!snapshot.exists()) {
      alert("Comment not found.");
      return;
    }

    const data = snapshot.val();

    if (data.uid !== currentUser.uid) {
      alert("You can only delete your own comment.");
      return;
    }

    await remove(commentRef);

  } catch (error) {
    console.error(error);
    alert("Delete failed: " + error.message);
  }
}

        input.value = "";
      } catch (error) {
        console.error(error);
        alert("Failed to submit comment: " + error.message);
      }
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      const date = new Date(timestamp);
      return date.toLocaleString();
    }

    function renderComments(postId) {
      const commentGroup = allComments[postId];
      if (!commentGroup) {
        return `<div class="empty-comment">No comments yet.</div>`;
      }

      const commentsArray = Object.entries(commentGroup)
        .map(([id, comment]) => ({
          id,
          ...comment
        }))
        .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      if (commentsArray.length === 0) {
        return `<div class="empty-comment">No comments yet.</div>`;
      }

      return commentsArray.map(comment => {
  const commentAvatar = comment.avatar && comment.avatar.trim() !== ""
    ? comment.avatar
    : "https://via.placeholder.com/40";

  const canDeleteComment = currentUser && currentUser.uid === comment.uid;

  return `
    <div class="comment-item">
      <div style="display:flex; gap:10px; align-items:flex-start;">
        <img 
          src="${commentAvatar}" 
          style="width:40px; height:40px; border-radius:50%; object-fit:cover;"
        >

        <div style="flex:1;">
          <div class="comment-meta">
            ${comment.name || "Anonymous"} · ${formatTime(comment.createdAt)}
          </div>

          <div class="comment-text">
            ${escapeHtml(comment.text || "")}
          </div>

          ${
            canDeleteComment
              ? `<button 
                  class="delete-comment-btn" 
                  data-post-id="${postId}" 
                  data-comment-id="${comment.id}"
                  style="margin-top:6px; background:#dc2626; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer;"
                >
                  Delete
                </button>`
              : ""
          }

        </div>
      </div>
    </div>
  `;
}).join("");
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderPosts() {
      const container = document.getElementById("posts-container");
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      container.innerHTML = "";

      const filteredPosts = allPosts.filter(post =>
        (post.name || "").toLowerCase().includes(keyword) ||
        (post.speak || "").toLowerCase().includes(keyword) ||
        (post.learn || "").toLowerCase().includes(keyword) ||
        (post.content || "").toLowerCase().includes(keyword) ||
        (post.contact || "").toLowerCase().includes(keyword)
      );

      if (filteredPosts.length === 0) {
        container.innerHTML = "<p>No matching posts found.</p>";
        return;
      }

      filteredPosts.forEach((post) => {
        const card = document.createElement("div");
        card.className = "profile-card";

        const avatarSrc = post.avatar && post.avatar.trim() !== ""
          ? post.avatar
          : "https://via.placeholder.com/60";

        const canDelete = currentUser && currentUser.uid === post.uid;

        card.innerHTML = `
          <img class="avatar-img" src="${avatarSrc}" alt="Avatar">
          <h3>👤 ${escapeHtml(post.name || "Unknown User")}</h3>
          <p><strong>Speaks:</strong> ${escapeHtml(post.speak || "Not provided")}</p>
          <p><strong>Learning:</strong> ${escapeHtml(post.learn || "Not provided")}</p>
          <p><strong>Introduction:</strong> ${escapeHtml(post.content || "")}</p>
          <p><strong>Contact:</strong> ${escapeHtml(post.contact || "Not provided")}</p>

          ${canDelete ? `<button class="delete-btn" data-id="${post.id}" data-uid="${post.uid}">Delete</button>` : ""}

          <div class="comments-section">
            <h4>Comments</h4>
            <div class="comments-list" id="comments-${post.id}">
              ${renderComments(post.id)}
            </div>

            <div class="comment-input-row">
              <input
                type="text"
                id="comment-input-${post.id}"
                placeholder="Write a comment..."
              />
              <button class="comment-btn" data-comment-post-id="${post.id}">Comment</button>
            </div>
          </div>
        `;

        container.appendChild(card);
      });

      document.querySelectorAll(".delete-comment-btn").forEach((btn) => {
  btn.addEventListener("click", async (e) => {
    const postId = e.target.getAttribute("data-post-id");
    const commentId = e.target.getAttribute("data-comment-id");

    await deleteComment(postId, commentId);
  });
      });

      document.querySelectorAll(".comment-btn").forEach((button) => {
        button.addEventListener("click", async (e) => {
          const postId = e.target.getAttribute("data-comment-post-id");
          await submitComment(postId);
        });
      });
    }

    document.getElementById("searchInput").addEventListener("input", renderPosts);
  </script>
</body>
</html>
