<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Partners</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background: #1d4ed8;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: normal;
    }

    #userInfo {
      font-size: 16px;
      font-weight: normal;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .filters {
      margin-bottom: 20px;
    }

    .filters input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .profile-card h3 {
      margin-bottom: 8px;
      color: #1d4ed8;
    }

    .profile-card p {
      margin: 6px 0;
      color: #374151;
    }

    .delete-btn {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #374151;
      color: white;
      cursor: pointer;
    }

    .avatar-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      display: block;
      margin-bottom: 12px;
    }

    .comments-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
    }

    .comments-section h4 {
      margin: 0 0 10px 0;
      color: #111827;
    }

    .comments-list {
      margin-bottom: 12px;
    }

    .comment-item {
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .comment-meta {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .comment-text {
      color: #111827;
      word-break: break-word;
    }

    .comment-input-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .comment-input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .comment-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    .empty-comment {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .action-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .friend-btn,
    .message-btn,
    .like-btn,
    .favorite-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .friend-btn {
      background: #16a34a;
    }

    .message-btn {
      background: #7c3aed;
    }

    .like-btn {
      background: #dc2626;
    }

    .favorite-btn {
      background: #d97706;
    }

    .mini-action-btn {
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    .mini-friend-btn {
      background: #16a34a;
    }

    .mini-message-btn {
      background: #7c3aed;
    }

    .mini-delete-btn {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <span>Find Partners</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="language-exchange.html">Language Exchange</a>
      <a href="friends.html">Friends</a>
      <a href="chat-list.html">Chats</a>
      <a href="profile.html">Profile</a>
      <span id="userInfo"></span>
      <a href="login.html" id="authLink">Login</a>
    </div>
  </div>

  <div class="container">
    <h1>Find Language Partners</h1>

    <div class="filters">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by language or name..."
      />
    </div>

    <div id="posts-container"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import {
      ref,
      onValue,
      remove,
      push,
      set,
      get
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const userInfo = document.getElementById("userInfo");
    const authLink = document.getElementById("authLink");

    let currentUser = null;
    let currentProfile = null;
    let allPosts = [];
    let allComments = {};
    let allLikes = {};
    let myFavorites = {};

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;

      if (user) {
        try {
          const userSnapshot = await get(ref(db, "users/" + currentUser.uid));
          currentProfile = userSnapshot.exists() ? userSnapshot.val() : null;
          userInfo.innerText = "👤 " + (currentProfile?.name || user.email);
        } catch (error) {
          console.error("Failed to load current user profile:", error);
          currentProfile = null;
          userInfo.innerText = "👤 " + user.email;
        }

        onValue(ref(db, `postFavorites/${currentUser.uid}`), (snapshot) => {
          myFavorites = snapshot.val() || {};
          renderPosts();
        });

        authLink.innerText = "Logout";
        authLink.href = "#";
        authLink.onclick = async (e) => {
          e.preventDefault();
          await signOut(auth);
          window.location.href = "login.html";
        };
      } else {
        currentProfile = null;
        myFavorites = {};
        userInfo.innerText = "";
        authLink.innerText = "Login";
        authLink.href = "login.html";
        authLink.onclick = null;
      }

      renderPosts();
    });

    onValue(ref(db, "posts"), (snapshot) => {
      allPosts = [];
      const data = snapshot.val() || {};

      Object.entries(data).forEach(([id, post]) => {
        allPosts.push({
          id,
          ...post
        });
      });

      allPosts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      renderPosts();
    });

    onValue(ref(db, "comments"), (snapshot) => {
      allComments = snapshot.val() || {};
      renderPosts();
    });

    onValue(ref(db, "postLikes"), (snapshot) => {
      allLikes = snapshot.val() || {};
      renderPosts();
    });

    async function toggleLike(postId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const likeRef = ref(db, `postLikes/${postId}/${currentUser.uid}`);
      const snapshot = await get(likeRef);

      if (snapshot.exists()) {
        await remove(likeRef);
      } else {
        await set(likeRef, true);
      }
    }

    async function toggleFavorite(postId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const favRef = ref(db, `postFavorites/${currentUser.uid}/${postId}`);
      const snapshot = await get(favRef);

      if (snapshot.exists()) {
        await remove(favRef);
      } else {
        await set(favRef, true);
      }
    }

    async function deletePost(postId, postUid) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      if (currentUser.uid !== postUid) {
        alert("You can only delete your own posts.");
        return;
      }

      try {
        await remove(ref(db, "posts/" + postId));
        await remove(ref(db, "comments/" + postId));
        await remove(ref(db, `postLikes/${postId}`));
        await remove(ref(db, `postFavorites/${currentUser.uid}/${postId}`));
        alert("Post deleted successfully.");
      } catch (error) {
        console.error(error);
        alert("Failed to delete post: " + error.message);
      }
    }

    async function submitComment(postId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      const input = document.getElementById(`comment-input-${postId}`);
      if (!input) return;

      const text = input.value.trim();

      if (!text) {
        alert("Please write a comment.");
        return;
      }

      try {
        const newCommentRef = push(ref(db, "comments/" + postId));

        await set(newCommentRef, {
          uid: currentUser.uid,
          name: currentProfile?.name || currentUser.email || "Anonymous",
          avatar: currentProfile?.avatar || "",
          text: text,
          createdAt: Date.now()
        });

        input.value = "";
      } catch (error) {
        console.error(error);
        alert("Failed to submit comment: " + error.message);
      }
    }

    async function deleteComment(postId, commentId) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      try {
        const commentRef = ref(db, `comments/${postId}/${commentId}`);
        const snapshot = await get(commentRef);

        if (!snapshot.exists()) {
          alert("Comment not found.");
          return;
        }

        const data = snapshot.val();

        if (data.uid !== currentUser.uid) {
          alert("You can only delete your own comment.");
          return;
        }

        await remove(commentRef);
      } catch (error) {
        console.error(error);
        alert("Delete failed: " + error.message);
      }
    }

    async function sendFriendRequest(targetUid, targetName, targetAvatar) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      if (currentUser.uid === targetUid) {
        alert("You cannot add yourself.");
        return;
      }

      try {
        const friendsSnapshot = await get(ref(db, `friends/${currentUser.uid}`));
        const myFriends = friendsSnapshot.val() || {};

        if (myFriends[targetUid]) {
          alert("You are already friends.");
          return;
        }

        const requestsSnapshot = await get(ref(db, "friendRequests"));
        const existing = requestsSnapshot.val() || {};

        const duplicate = Object.values(existing).some(req =>
          (
            req.fromUid === currentUser.uid &&
            req.toUid === targetUid &&
            req.status === "pending"
          ) ||
          (
            req.fromUid === targetUid &&
            req.toUid === currentUser.uid &&
            req.status === "pending"
          )
        );

        if (duplicate) {
          alert("A friend request already exists.");
          return;
        }

        const newRequestRef = push(ref(db, "friendRequests"));

        await set(newRequestRef, {
          fromUid: currentUser.uid,
          fromName: currentProfile?.name || currentUser.email,
          fromAvatar: currentProfile?.avatar || "",
          toUid: targetUid,
          toName: targetName || "",
          toAvatar: targetAvatar || "",
          status: "pending",
          createdAt: Date.now()
        });

        alert("Friend request sent.");
      } catch (error) {
        console.error(error);
        alert("Failed to send friend request: " + error.message);
      }
    }

    async function openPrivateChat(targetUid) {
      if (!currentUser) {
        alert("Please login first.");
        return;
      }

      try {
        const chatsSnapshot = await get(ref(db, "chats"));
        const chats = chatsSnapshot.val() || {};

        let foundChatId = null;

        for (const [chatId, chat] of Object.entries(chats)) {
          if (
            chat.type === "private" &&
            chat.memberIds &&
            chat.memberIds[currentUser.uid] &&
            chat.memberIds[targetUid]
          ) {
            foundChatId = chatId;
            break;
          }
        }

        if (!foundChatId) {
          const newChatRef = push(ref(db, "chats"));
          foundChatId = newChatRef.key;

          await set(newChatRef, {
            type: "private",
            memberIds: {
              [currentUser.uid]: true,
              [targetUid]: true
            },
            memberList: [currentUser.uid, targetUid],
            createdAt: Date.now(),
            lastMessage: "",
            lastMessageAt: Date.now()
          });
        }

        window.location.href = `chat.html?chatId=${foundChatId}`;
      } catch (error) {
        console.error(error);
        alert("Failed to open chat: " + error.message);
      }
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      return new Date(timestamp).toLocaleString();
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderComments(postId) {
      const commentGroup = allComments[postId];
      if (!commentGroup) {
        return `<div class="empty-comment">No comments yet.</div>`;
      }

      const commentsArray = Object.entries(commentGroup)
        .map(([id, comment]) => ({
          id,
          ...comment
        }))
        .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      if (commentsArray.length === 0) {
        return `<div class="empty-comment">No comments yet.</div>`;
      }

      return commentsArray.map(comment => {
        const commentAvatar = comment.avatar && comment.avatar.trim() !== ""
          ? comment.avatar
          : "https://via.placeholder.com/40";

        const canDeleteComment = currentUser && currentUser.uid === comment.uid;
        const safeName = escapeHtml(comment.name || "Anonymous");
        const rawAvatar = comment.avatar || "";

        return `
          <div class="comment-item">
            <div style="display:flex; gap:10px; align-items:flex-start;">
              <img
                src="${commentAvatar}"
                alt="avatar"
                style="width:40px; height:40px; border-radius:50%; object-fit:cover; background:#dbeafe;"
              >

              <div style="flex:1;">
                <div class="comment-meta">
                  ${safeName} · ${formatTime(comment.createdAt)}
                </div>

                <div class="comment-text">
                  ${escapeHtml(comment.text || "")}
                </div>

                <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
                  ${
                    currentUser && currentUser.uid !== comment.uid
                      ? `
                        <button
                          class="mini-action-btn"
                          style="background:#16a34a;"
                          onclick="handleCommentFriendRequest('${comment.uid}', '${safeName}', '${rawAvatar}')"
                        >
                          Add Friend
                        </button>

                        <button
                          class="mini-action-btn"
                          style="background:#7c3aed;"
                          onclick="handleCommentMessage('${comment.uid}')"
                        >
                          Message
                        </button>
                      `
                      : ""
                  }

                  ${
                    canDeleteComment
                      ? `
                        <button
                          class="mini-action-btn"
                          style="background:#dc2626;"
                          onclick="handleDeleteComment('${postId}', '${comment.id}')"
                        >
                          Delete
                        </button>
                      `
                      : ""
                  }
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderPosts() {
      const container = document.getElementById("posts-container");
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      container.innerHTML = "";

      const filteredPosts = allPosts.filter(post =>
        (post.name || "").toLowerCase().includes(keyword) ||
        (post.speak || "").toLowerCase().includes(keyword) ||
        (post.learn || "").toLowerCase().includes(keyword) ||
        (post.content || "").toLowerCase().includes(keyword) ||
        (post.contact || "").toLowerCase().includes(keyword)
      );

      if (filteredPosts.length === 0) {
        container.innerHTML = "<p>No matching posts found.</p>";
        return;
      }

      filteredPosts.forEach((post) => {
        const card = document.createElement("div");
        card.className = "profile-card";

        const avatarSrc = post.avatar && post.avatar.trim() !== ""
          ? post.avatar
          : "https://via.placeholder.com/60";

        const canDelete = currentUser && currentUser.uid === post.uid;
        const likeCount = allLikes[post.id] ? Object.keys(allLikes[post.id]).length : 0;
        const liked = currentUser && allLikes[post.id] && allLikes[post.id][currentUser.uid];
        const favorited = currentUser && myFavorites[post.id];

        card.innerHTML = `
          <img class="avatar-img" src="${avatarSrc}" alt="Avatar">
          <h3>👤 ${escapeHtml(post.name || "Unknown User")}</h3>
          <p><strong>Speaks:</strong> ${escapeHtml(post.speak || "Not provided")}</p>
          <p><strong>Learning:</strong> ${escapeHtml(post.learn || "Not provided")}</p>
          <p><strong>Introduction:</strong> ${escapeHtml(post.content || "")}</p>
          <p><strong>Contact:</strong> ${escapeHtml(post.contact || "Not provided")}</p>

          <div class="action-row">
            <button class="like-btn" onclick="handleToggleLike('${post.id}')">
              ${liked ? "Unlike" : "Like"} (${likeCount})
            </button>

            <button class="favorite-btn" onclick="handleToggleFavorite('${post.id}')">
              ${favorited ? "Unfavorite" : "Favorite"}
            </button>

            ${
              currentUser && currentUser.uid !== post.uid
                ? `
                  <button
                    class="friend-btn"
                    data-uid="${post.uid}"
                    data-name="${escapeHtml(post.name || "")}"
                    data-avatar="${post.avatar || ""}">
                    Add Friend
                  </button>

                  <button
                    class="message-btn"
                    data-uid="${post.uid}">
                    Message
                  </button>
                `
                : ""
            }

            ${
              canDelete
                ? `<button class="delete-btn" onclick="handleDeletePost('${post.id}', '${post.uid}')">Delete</button>`
                : ""
            }
          </div>

          <div class="comments-section">
            <h4>Comments</h4>
            <div class="comments-list" id="comments-${post.id}">
              ${renderComments(post.id)}
            </div>

            <div class="comment-input-row">
              <input
                type="text"
                id="comment-input-${post.id}"
                placeholder="Write a comment..."
              />
              <button class="comment-btn" data-comment-post-id="${post.id}">Comment</button>
            </div>
          </div>
        `;

        container.appendChild(card);
      });

      document.querySelectorAll(".comment-btn").forEach((button) => {
        button.addEventListener("click", async (e) => {
          const postId = e.target.getAttribute("data-comment-post-id");
          await submitComment(postId);
        });
      });

      document.querySelectorAll(".friend-btn").forEach((button) => {
        button.addEventListener("click", async (e) => {
          const targetUid = e.target.getAttribute("data-uid");
          const targetName = e.target.getAttribute("data-name");
          const targetAvatar = e.target.getAttribute("data-avatar");
          await sendFriendRequest(targetUid, targetName, targetAvatar);
        });
      });

      document.querySelectorAll(".message-btn").forEach((button) => {
        button.addEventListener("click", async (e) => {
          const targetUid = e.target.getAttribute("data-uid");
          await openPrivateChat(targetUid);
        });
      });
    }

    document.getElementById("searchInput").addEventListener("input", renderPosts);

    window.handleDeleteComment = deleteComment;
    window.handleCommentFriendRequest = sendFriendRequest;
    window.handleCommentMessage = openPrivateChat;
    window.handleDeletePost = deletePost;
    window.handleToggleLike = toggleLike;
    window.handleToggleFavorite = toggleFavorite;
  </script>
</body>
</html>
