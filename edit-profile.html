<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>

  <style>
    body{
      font-family:Arial, sans-serif;
      background:#f3f4f6;
      margin:0;
    }

    .navbar{
      background:#1d4ed8;
      color:white;
      padding:16px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      font-size:22px;
      font-weight:bold;
    }

    .language-switcher{
      padding:8px 10px;
      border-radius:8px;
      border:none;
      font-size:14px;
      cursor:pointer;
    }

    .container{
      max-width:600px;
      margin:40px auto;
      background:white;
      padding:24px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    h2{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:0 0 16px 0;
      box-sizing:border-box;
      border:1px solid #d1d5db;
      border-radius:8px;
      font-size:15px;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    button{
      padding:10px 16px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-right:10px;
    }

    .preview{
      width:90px;
      height:90px;
      border-radius:50%;
      object-fit:cover;
      display:block;
      margin:10px 0 16px 0;
      background:#dbeafe;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <span id="pageTitle">Edit Profile</span>

    <select id="languageSwitcher" class="language-switcher">
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <div class="container">
    <h2 id="heading">Edit Profile</h2>

    <label id="schoolLabel">School</label>
    <input id="school" placeholder="Enter your school">

    <label id="bioLabel">Bio</label>
    <textarea id="bio" placeholder="Write a short self introduction"></textarea>

    <label id="speakLabel">Languages You Speak</label>
    <input id="speak" placeholder="Chinese, English...">

    <label id="learnLabel">Language You Learn</label>
    <input id="learn" placeholder="Japanese...">

    <label id="contactLabel">Instagram / Contact</label>
    <input id="contact" placeholder="@instagram / LINE / etc.">

    <label id="avatarLabel">Avatar</label>
    <input type="file" id="avatar" accept="image/*">

    <img id="avatarPreview" class="preview" src="https://via.placeholder.com/90" alt="Avatar Preview">

    <button onclick="saveProfile()" id="saveBtn">Save</button>
    <button onclick="window.location.href='profile.html'" id="backBtn">Back</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, get, update } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
    import { getCurrentLanguage, setCurrentLanguage } from "./language.js";

    let currentUser = null;
    let currentProfile = {};

    const schoolInput = document.getElementById("school");
    const bioInput = document.getElementById("bio");
    const speakInput = document.getElementById("speak");
    const learnInput = document.getElementById("learn");
    const contactInput = document.getElementById("contact");
    const avatarInput = document.getElementById("avatar");
    const avatarPreview = document.getElementById("avatarPreview");
    const languageSwitcher = document.getElementById("languageSwitcher");

    function getEditProfileText(lang) {
      if (lang === "ja") {
        return {
          pageTitle: "プロフィール編集",
          heading: "プロフィール編集",
          school: "学校",
          schoolPlaceholder: "学校名を入力してください",
          bio: "Bio",
          bioPlaceholder: "簡単な自己紹介を書いてください",
          speaks: "話せる言語",
          speaksPlaceholder: "中国語、英語...",
          learn: "学びたい言語",
          learnPlaceholder: "日本語...",
          contact: "Instagram / 連絡先",
          contactPlaceholder: "@instagram / LINE など",
          avatar: "プロフィール画像",
          save: "保存",
          back: "戻る",
          pleaseLoginFirst: "先にログインしてください",
          failedToLoad: "プロフィールデータの読み込みに失敗しました",
          profileUpdated: "プロフィールを更新しました",
          failedToUpdate: "プロフィールの更新に失敗しました: ",
          failedToReadImage: "画像ファイルの読み込みに失敗しました"
        };
      }

      return {
        pageTitle: "Edit Profile",
        heading: "Edit Profile",
        school: "School",
        schoolPlaceholder: "Enter your school",
        bio: "Bio",
        bioPlaceholder: "Write a short self introduction",
        speaks: "Languages You Speak",
        speaksPlaceholder: "Chinese, English...",
        learn: "Language You Learn",
        learnPlaceholder: "Japanese...",
        contact: "Instagram / Contact",
        contactPlaceholder: "@instagram / LINE / etc.",
        avatar: "Avatar",
        save: "Save",
        back: "Back",
        pleaseLoginFirst: "Please login first",
        failedToLoad: "Failed to load profile data",
        profileUpdated: "Profile updated",
        failedToUpdate: "Failed to update profile: ",
        failedToReadImage: "Failed to read image file"
      };
    }

    function applyLanguage() {
      const lang = getCurrentLanguage();
      const t = getEditProfileText(lang);

      document.documentElement.lang = lang;
      document.title = t.pageTitle;
      document.getElementById("pageTitle").innerText = t.pageTitle;
      document.getElementById("heading").innerText = t.heading;
      document.getElementById("schoolLabel").innerText = t.school;
      schoolInput.placeholder = t.schoolPlaceholder;
      document.getElementById("bioLabel").innerText = t.bio;
      bioInput.placeholder = t.bioPlaceholder;
      document.getElementById("speakLabel").innerText = t.speaks;
      speakInput.placeholder = t.speaksPlaceholder;
      document.getElementById("learnLabel").innerText = t.learn;
      learnInput.placeholder = t.learnPlaceholder;
      document.getElementById("contactLabel").innerText = t.contact;
      contactInput.placeholder = t.contactPlaceholder;
      document.getElementById("avatarLabel").innerText = t.avatar;
      document.getElementById("saveBtn").innerText = t.save;
      document.getElementById("backBtn").innerText = t.back;

      languageSwitcher.value = lang;
    }

    languageSwitcher.addEventListener("change", (e) => {
      setCurrentLanguage(e.target.value);
      applyLanguage();
    });

    onAuthStateChanged(auth, async (user) => {
      const t = getEditProfileText(getCurrentLanguage());

      if (!user) {
        alert(t.pleaseLoginFirst);
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const snapshot = await get(ref(db, "users/" + user.uid));

        if (snapshot.exists()) {
          currentProfile = snapshot.val();

          schoolInput.value = currentProfile.school || "";
          bioInput.value = currentProfile.bio || "";
          speakInput.value = currentProfile.speak || "";
          learnInput.value = currentProfile.learn || "";
          contactInput.value = currentProfile.contact || "";

          if (currentProfile.avatar) {
            avatarPreview.src = currentProfile.avatar;
          }
        }
      } catch (error) {
        console.error(error);
        alert(t.failedToLoad);
      }
    });

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        avatarPreview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    async function saveProfile() {
      const t = getEditProfileText(getCurrentLanguage());

      if (!currentUser) {
        alert(t.pleaseLoginFirst);
        return;
      }

      const updatedData = {
        school: schoolInput.value.trim(),
        bio: bioInput.value.trim(),
        speak: speakInput.value.trim(),
        learn: learnInput.value.trim(),
        contact: contactInput.value.trim()
      };

      const avatarFile = avatarInput.files[0];

      try {
        if (avatarFile) {
          const avatarBase64 = await readFileAsDataURL(avatarFile);
          updatedData.avatar = avatarBase64;
        }

        await update(ref(db, "users/" + currentUser.uid), updatedData);

        alert(t.profileUpdated);
        window.location.href = "profile.html";
      } catch (error) {
        console.error(error);
        alert(t.failedToUpdate + error.message);
      }
    }

    function readFileAsDataURL(file) {
      const t = getEditProfileText(getCurrentLanguage());

      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function(e) {
          resolve(e.target.result);
        };

        reader.onerror = function() {
          reject(new Error(t.failedToReadImage));
        };

        reader.readAsDataURL(file);
      });
    }

    window.saveProfile = saveProfile;

    applyLanguage();
  </script>

</body>
</html>
