<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile</title>

  <style>
    body{
      font-family:Arial, sans-serif;
      background:#f3f4f6;
      margin:0;
    }

    .container{
      max-width:600px;
      margin:40px auto;
      background:white;
      padding:24px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    h2{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:0 0 16px 0;
      box-sizing:border-box;
      border:1px solid #d1d5db;
      border-radius:8px;
      font-size:15px;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    button{
      padding:10px 16px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-right:10px;
    }

    .preview{
      width:90px;
      height:90px;
      border-radius:50%;
      object-fit:cover;
      display:block;
      margin:10px 0 16px 0;
      background:#dbeafe;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Edit Profile</h2>

    <label>School</label>
    <input id="school" placeholder="Enter your school">

    <label>Bio</label>
    <textarea id="bio" placeholder="Write a short self introduction"></textarea>

    <label>Languages You Speak</label>
    <input id="speak" placeholder="Chinese, English...">

    <label>Language You Learn</label>
    <input id="learn" placeholder="Japanese...">

    <label>Instagram / Contact</label>
    <input id="contact" placeholder="@instagram / LINE / etc.">

    <label>Avatar</label>
    <input type="file" id="avatar" accept="image/*">

    <img id="avatarPreview" class="preview" src="https://via.placeholder.com/90" alt="Avatar Preview">

    <button onclick="saveProfile()">Save</button>
    <button onclick="window.location.href='profile.html'">Back</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { ref, get, update } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    let currentUser = null;
    let currentProfile = {};

    const schoolInput = document.getElementById("school");
    const bioInput = document.getElementById("bio");
    const speakInput = document.getElementById("speak");
    const learnInput = document.getElementById("learn");
    const contactInput = document.getElementById("contact");
    const avatarInput = document.getElementById("avatar");
    const avatarPreview = document.getElementById("avatarPreview");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try {
        const snapshot = await get(ref(db, "users/" + user.uid));

        if (snapshot.exists()) {
          currentProfile = snapshot.val();

          schoolInput.value = currentProfile.school || "";
          bioInput.value = currentProfile.bio || "";
          speakInput.value = currentProfile.speak || "";
          learnInput.value = currentProfile.learn || "";
          contactInput.value = currentProfile.contact || "";

          if (currentProfile.avatar) {
            avatarPreview.src = currentProfile.avatar;
          }
        }
      } catch (error) {
        console.error(error);
        alert("Failed to load profile data");
      }
    });

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        avatarPreview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    async function saveProfile() {
      if (!currentUser) {
        alert("Please login first");
        return;
      }

      const updatedData = {
        school: schoolInput.value.trim(),
        bio: bioInput.value.trim(),
        speak: speakInput.value.trim(),
        learn: learnInput.value.trim(),
        contact: contactInput.value.trim()
      };

      const avatarFile = avatarInput.files[0];

      try {
        if (avatarFile) {
          const avatarBase64 = await readFileAsDataURL(avatarFile);
          updatedData.avatar = avatarBase64;
        }

        await update(ref(db, "users/" + currentUser.uid), updatedData);

        alert("Profile updated");
        window.location.href = "profile.html";
      } catch (error) {
        console.error(error);
        alert("Failed to update profile: " + error.message);
      }
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function(e) {
          resolve(e.target.result);
        };

        reader.onerror = function() {
          reject(new Error("Failed to read image file"));
        };

        reader.readAsDataURL(file);
      });
    }

    window.saveProfile = saveProfile;
  </script>

</body>
</html>
